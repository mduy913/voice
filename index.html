
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#ffdde1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}
.box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}
button{
    padding:10px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
#yes{
    background:#ff4d6d;
    color:white;
}
#no{
    background:#777;
    color:white;
}
#result{
    margin-top:20px;
    font-size:32px;
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
    <h2>Bạn có yêu mình không? ❤️</h2>

    <button id="yes" onclick="love()">Yes</button>
    <button id="no" onclick="no()">No</button>

    <div id="result"></div>
</div>

<script>
function love(){
    document.getElementById("result").innerHTML =
    "❤️ I LOVE YOU ❤️<br>💖💖💖💖💖";
}

function no(){
    alert("Thử bấm Yes xem 😉");
}
</script>

</body>
</html>
